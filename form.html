<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review WDD131</title>
    <meta name="author" content="Braxton LaFleur">
    <meta name="description" content="this is a practice webpage to further skills for form development.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <script src="scripts/form.js" defer></script>
    <link rel="stylesheet" href="styles/form.css">
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html" class="wf1">
            <label for="product">Product Name
                <select name="product" id="product" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </label>

            <div>Overall Rating</div>
            <span class="stars">
                <label for="oneS"><input type="radio" name="star" id="oneS" value="oneStar" required>&star;</label>
                <label for="twoS"><input type="radio" name="star" id="twoS" value="twoStar" required>&star;&star;</label>
                <label for="threeS"><input type="radio" name="star" id="threeS" value="threeStar" required>&star;&star;&star;</label>
                <label for="fourS"><input type="radio" name="star" id="fourS" value="fourStar" required>&star;&star;&star;&star;</label>
                <label for="fiveS"><input type="radio" name="star" id="fiveS" value="fiveStar" required>&star;&star;&star;&star;&star;</label>
            </span>

            <label>Date of Installation<input type="date" name="date" id="date" required></label>

            <div class="divTop">Which features did you find useful in the product?</div>
            <div>(Check all that apply)</div>
            <div class="features">
                <label for="durability"><input type="checkbox" name="durability" id="durability" value="durability">Durability</label>
                <label for="easeOfUse"><input type="checkbox" name="easeOfUse" id="easeOfUse" value="easeOfUse">Ease of Use</label>
                <label for="performance"><input type="checkbox" name="performance" id="performance" value="performance">Performance</label>
                <label for="design"><input type="checkbox" name="design" id="design" value="design">Design</label>
            </div>

            <label for="review">Written Review <span class="optional">(optional)</span><textarea name="review" id="review" class="review"></textarea></label>

            <label for="username">Your Name <span class="optional">(optional)</span><input type="text" id="username"></label>

            <input type="submit" value="Post Your Review">
        </form>
    </main>
    <footer>
        <p>
            ©<span id="currentyear"></span> | Braxton LaFleur | Utah
        </p>
        <p id="lastModified"></p>
    </footer>
</body>
</html>
